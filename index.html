<title>12周训练计划</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f0f0f; color: #e8e8e8; min-height: 100vh;
    padding: 24px 16px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(140px, calc(env(safe-area-inset-bottom) + 140px));
    -webkit-tap-highlight-color: transparent;
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.05em; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }

  .week-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
  .week-btn {
    position: relative; padding: 6px 12px; border-radius: 20px; border: 1px solid #333;
    background: #1a1a1a; color: #888; font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .week-btn:hover { border-color: #555; color: #ccc; }
  .week-btn.active { background: #e8ff00; color: #000; border-color: #e8ff00; font-weight: 700; }
  .week-btn.completed { background: #1a2a1a; border-color: #2d5a2d; color: #4a9a4a; }
  .week-btn.deload { border-style: dashed; border-color: #5a4a1a; color: #c9a13a; }
  .week-btn.deload.active { background: #c9a13a; color: #000; border-color: #c9a13a; }
  .week-btn.deload.completed { color: #4a9a4a; border-color: #2d5a2d; }

  .day-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .day-tab {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #222; background: #141414;
    color: #666; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .day-tab:hover { border-color: #444; color: #aaa; }
  .day-tab.active { border-color: #e8ff00; color: #e8ff00; background: #1a1f00; }
  .day-tab.done { border-color: #2d5a2d; color: #4a9a4a; background: #0d1a0d; }
  .day-label { font-size: 10px; font-weight: 400; opacity: 0.7; display: block; margin-top: 2px; }

  .deload-banner {
    background: #1f1a0a; border: 1px dashed #5a4a1a; border-radius: 10px; padding: 12px;
    margin-bottom: 16px; font-size: 12px; color: #c9a13a; line-height: 1.6;
  }
  .deload-banner strong { color: #e8c84a; }

  .exercise-card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 12px; transition: border-color 0.2s; }
  .exercise-card.completed-card { border-color: #2d5a2d; }
  .exercise-card.stall-card { border-color: #5a2d2d; }
  .exercise-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .exercise-name { font-size: 15px; font-weight: 700; color: #fff; }
  .exercise-target { font-size: 12px; color: #666; margin-top: 2px; max-width: 200px; }
  .suggest-badge { background: #2a2a1a; color: #c9c97a; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }

  .weight-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .weight-stepper { display: flex; align-items: center; gap: 0; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; }
  .step-btn { width: 38px; height: 38px; background: #1a1a1a; color: #e8ff00; font-size: 20px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .step-btn:active { background: #2a2a2a; }
  .weight-value { min-width: 92px; text-align: center; font-size: 16px; font-weight: 800; color: #e8ff00; padding: 0 8px; }
  .weight-meta { font-size: 11px; color: #555; line-height: 1.4; }
  .weight-meta .orm { color: #6a9ad8; font-weight: 600; }

  .sets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .set-box { background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 10px 6px; text-align: center; cursor: pointer; transition: all 0.15s; user-select: none; }
  .set-box:hover { border-color: #444; }
  .set-box.set-done { background: #0d1a0d; border-color: #2d5a2d; }
  .set-box.set-failed { background: #1a0d0d; border-color: #5a2d2d; }
  .set-number { font-size: 10px; color: #555; margin-bottom: 4px; }
  .set-reps { font-size: 16px; font-weight: 700; color: #e8ff00; }
  .set-box.set-done .set-reps { color: #4a9a4a; }
  .set-check { font-size: 18px; color: #4a9a4a; }
  .set-cross { font-size: 18px; color: #d86a6a; }

  .stall-note { margin-top: 10px; font-size: 11px; color: #d89a6a; background: #1a120a; border-radius: 8px; padding: 8px 10px; }

  .progress-bar-wrap { background: #1a1a1a; border-radius: 4px; height: 4px; margin-bottom: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #e8ff00; border-radius: 4px; transition: width 0.4s ease; }
  .volume-line { font-size: 11px; color: #555; margin-bottom: 16px; text-align: right; }
  .volume-line strong { color: #6a9ad8; }

  .progress-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-value { font-size: 22px; font-weight: 800; color: #e8ff00; }
  .stat-label { font-size: 11px; color: #555; margin-top: 2px; }

  .finish-btn { width: 100%; padding: 14px; background: #e8ff00; color: #000; font-size: 15px; font-weight: 800; border: none; border-radius: 12px; cursor: pointer; margin-top: 8px; letter-spacing: 0.05em; transition: opacity 0.2s; }
  .finish-btn:hover { opacity: 0.85; }
  .finish-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Rest timer */
  #rest-bar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    background: #181818; border-top: 1px solid #2a2a2a;
    padding: 14px 16px; padding-bottom: max(14px, env(safe-area-inset-bottom));
    display: none; align-items: center; gap: 12px;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.5);
  }
  #rest-bar.show { display: flex; }
  .rest-time { font-size: 28px; font-weight: 800; color: #e8ff00; font-variant-numeric: tabular-nums; min-width: 78px; }
  .rest-label { font-size: 11px; color: #777; }
  .rest-btns { margin-left: auto; display: flex; gap: 8px; }
  .rest-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #ccc; font-size: 12px; font-weight: 600; cursor: pointer; }
  .rest-btn.skip { background: #e8ff00; color: #000; border-color: #e8ff00; }
  .rest-ring { width: 6px; align-self: stretch; border-radius: 3px; background: #2a2a2a; overflow: hidden; position: relative; }
  .rest-ring-fill { position: absolute; bottom: 0; left: 0; right: 0; background: #e8ff00; transition: height 1s linear; }
</style>
</head>
<body>

<h1>12周训练计划 💪</h1>
<p class="subtitle">周期化进阶 · 3周冲击+1周减载 · 自调节</p>

<div class="progress-summary">
  <div class="stat-card"><div class="stat-value" id="stat-weeks">0</div><div class="stat-label">完成周数</div></div>
  <div class="stat-card"><div class="stat-value" id="stat-sessions">0</div><div class="stat-label">完成训练</div></div>
  <div class="stat-card"><div class="stat-value" id="stat-pct">0%</div><div class="stat-label">总进度</div></div>
</div>

<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
  <span style="font-size:12px;color:#888;">当前体重</span>
  <div class="weight-stepper">
    <button class="step-btn" onclick="stepBody(-1)">−</button>
    <div class="weight-value" id="bw-val">175lbs</div>
    <button class="step-btn" onclick="stepBody(1)">+</button>
  </div>
  <span style="font-size:11px;color:#555;">用于计算引体真实负荷</span>
</div>

<div style="margin-bottom:10px; font-size:12px; color:#555;">选择周次（虚线=减载周）</div>
<div class="week-selector" id="week-selector"></div>

<div class="day-tabs" id="day-tabs">
  <div class="day-tab active" id="tab0" onclick="selectDay(0)">周一<span class="day-label" id="lbl0"></span></div>
  <div class="day-tab" id="tab1" onclick="selectDay(1)">周三<span class="day-label" id="lbl1"></span></div>
  <div class="day-tab" id="tab2" onclick="selectDay(2)">周五<span class="day-label" id="lbl2"></span></div>
</div>

<div class="progress-bar-wrap"><div class="progress-bar-fill" id="session-progress" style="width:0%"></div></div>
<div class="volume-line" id="volume-line"></div>

<div id="exercise-list"></div>

<button class="finish-btn" id="finish-btn" onclick="finishSession()" disabled>完成今日训练 ✓</button>

<!-- Rest timer -->
<div id="rest-bar">
  <div class="rest-ring"><div class="rest-ring-fill" id="rest-ring-fill"></div></div>
  <div>
    <div class="rest-time" id="rest-time">0:00</div>
    <div class="rest-label">组间休息</div>
  </div>
  <div class="rest-btns">
    <button class="rest-btn" onclick="addRest(30)">+30s</button>
    <button class="rest-btn skip" onclick="stopRest()">跳过</button>
  </div>
</div>

<script>
const BASE = { squat:160, deadlift:180, bench:135, pullup:0, rdl:135, row:150 };
const INCREMENT = { squat:5, deadlift:5, bench:2.5, pullup:2.5, rdl:5, row:5 };

const DAYS = [
  { name:'周一', type:'力量', sets:4, reps:5, pct:1.0, rest:180, exercises:[
    { key:'squat',    name:'杠铃深蹲',       note:'全幅度，膝盖追脚尖，核心收紧' },
    { key:'deadlift', name:'杠铃硬拉',       note:'杠贴小腿，背部挺直，髋部发力' },
    { key:'bench',    name:'杠铃卧推',       note:'肩胛骨收紧下沉，控制离心阶段' },
    { key:'pullup',   name:'加重引体向上',   note:'顶部停顿1秒，全幅度下放' }
  ]},
  { name:'周三', type:'肌肥大', sets:4, reps:12, pct:0.75, rest:75, exercises:[
    { key:'squat', name:'腿举机',           note:'脚位与肩同宽，不要锁死膝盖' },
    { key:'rdl',   name:'罗马尼亚硬拉',     note:'感受腘绳肌拉伸，杠铃不落地' },
    { key:'bench', name:'哑铃上斜卧推',     note:'30-45度斜板，感受上胸收缩' },
    { key:'row',   name:'坐姿绳索划船',     note:'肩胛骨主动后收，不要借腰' }
  ]},
  { name:'周五', type:'混合', sets:4, reps:8, pct:0.875, rest:120, exercises:[
    { key:'squat', name:'杠铃深蹲',         note:'比周一轻，专注控制节奏' },
    { key:'rdl',   name:'罗马尼亚硬拉',     note:'3秒离心，感受拉伸' },
    { key:'bench', name:'哑铃卧推',         note:'两侧独立发力，检查不平衡' },
    { key:'pullup',name:'引体向上',         note:'自重力竭，能做几个做几个' }
  ]}
];

const DELOAD_SETS = 2;
const DELOAD_REST = 90;

let currentWeek = 1;
let currentDay = 0;
let bodyWeight = 175;
let setStates = {};      // {sk:{exIdx:[ '', 'done', 'failed' ]}}
let actualWeights = {};  // {sk:{exIdx:number}}  (pullup => added lbs)
let completedSessions = {};

// rest timer
let restRemaining = 0, restTotal = 0, restInterval = null;

function isDeload(week){ return week % 4 === 0; }
function round25(w){ return Math.round(w/2.5)*2.5; }
function sk(week, day){ return 'w'+week+'d'+day; }
function dayConfig(day, week){
  const d = DAYS[day];
  const dl = isDeload(week);
  return { ...d, sets: dl?DELOAD_SETS:d.sets, rest: dl?DELOAD_REST:d.rest, deload: dl };
}

function blockPeakNum(key, week){
  const block = Math.floor((week-1)/4);
  const inc = INCREMENT[key];
  return (BASE[key] + block*(2*inc)) + 2*inc;
}
// returns numeric suggested weight (pullup => added lbs, can be 0)
function suggestedNum(key, week, dayPct){
  const inc = INCREMENT[key];
  if(isDeload(week)) return round25(blockPeakNum(key, week)*0.6);
  const block = Math.floor((week-1)/4), wib = (week-1)%4;
  const blockBase = BASE[key] + block*(2*inc);
  if(key==='pullup') return round25(blockBase + wib*inc);
  return round25((blockBase + wib*inc)*dayPct);
}
function fmtWeight(key, num){
  if(key==='pullup') return num<=0 ? '自重' : '自重+'+num+'lbs';
  return num+'lbs';
}
function epley(w, reps){ return Math.round(w*(1+reps/30)); }

function getActual(key, exIdx, week, day, dayPct){
  const k = sk(week, day);
  if(actualWeights[k] && actualWeights[k][exIdx] !== undefined) return actualWeights[k][exIdx];
  return suggestedNum(key, week, dayPct);
}
function setActual(exIdx, val){
  const k = sk(currentWeek, currentDay);
  if(!actualWeights[k]) actualWeights[k] = {};
  actualWeights[k][exIdx] = Math.max(0, val);
  save(); renderExercises();
}
function stepWeight(exIdx, key, dir){
  const cur = getActual(key, exIdx, currentWeek, currentDay, DAYS[currentDay].pct);
  setActual(exIdx, cur + dir*2.5);
}

function getStates(exIdx, nSets){
  const k = sk(currentWeek, currentDay);
  if(!setStates[k]) setStates[k] = {};
  if(!setStates[k][exIdx] || setStates[k][exIdx].length !== nSets){
    const old = setStates[k][exIdx] || [];
    const arr = [];
    for(let i=0;i<nSets;i++) arr.push(old[i] || '');
    setStates[k][exIdx] = arr;
  }
  return setStates[k][exIdx];
}
function cycleSet(exIdx, setIdx, nSets, rest){
  const arr = getStates(exIdx, nSets);
  const order = ['', 'done', 'failed'];
  const next = order[(order.indexOf(arr[setIdx]) + 1) % 3];
  arr[setIdx] = next;
  save();
  if(next === 'done') startRest(rest);
  renderExercises();
}

/* ---------- Rest timer ---------- */
function startRest(seconds){
  restTotal = seconds; restRemaining = seconds;
  document.getElementById('rest-bar').classList.add('show');
  updateRestUI();
  if(restInterval) clearInterval(restInterval);
  restInterval = setInterval(()=>{
    restRemaining--;
    if(restRemaining <= 0){ tickDone(); } else { updateRestUI(); }
  }, 1000);
}
function tickDone(){
  clearInterval(restInterval); restInterval=null; restRemaining=0;
  updateRestUI();
  try { if(navigator.vibrate) navigator.vibrate([120,60,120]); } catch(e){}
  document.getElementById('rest-time').textContent = '休息结束';
  setTimeout(stopRest, 1500);
}
function addRest(s){ restRemaining += s; restTotal += s; updateRestUI(); }
function stopRest(){
  if(restInterval) clearInterval(restInterval);
  restInterval=null; restRemaining=0;
  document.getElementById('rest-bar').classList.remove('show');
}
function updateRestUI(){
  const m = Math.floor(restRemaining/60), s = restRemaining%60;
  document.getElementById('rest-time').textContent = m+':'+String(s).padStart(2,'0');
  const pct = restTotal>0 ? (restRemaining/restTotal)*100 : 0;
  document.getElementById('rest-ring-fill').style.height = pct+'%';
}

/* ---------- Render ---------- */
function renderWeeks(){
  const c = document.getElementById('week-selector'); c.innerHTML='';
  for(let w=1; w<=12; w++){
    const b = document.createElement('div');
    b.className = 'week-btn' + (isDeload(w)?' deload':'');
    b.textContent = isDeload(w) ? ('第'+w+'周·减') : ('第'+w+'周');
    const allDone = [0,1,2].every(d => completedSessions[sk(w,d)]);
    if(allDone) b.classList.add('completed');
    if(w===currentWeek) b.classList.add('active');
    b.onclick = ()=>{ currentWeek=w; renderAll(); };
    c.appendChild(b);
  }
}
function renderDayTabs(){
  const dl = isDeload(currentWeek);
  const labels = dl ? ['减载 2组','减载 2组','减载 2组']
                    : ['力量 4×5','肌肥大 4×12','混合 4×8'];
  for(let i=0;i<3;i++){
    const tab = document.getElementById('tab'+i);
    document.getElementById('lbl'+i).textContent = labels[i];
    tab.classList.remove('active','done');
    if(completedSessions[sk(currentWeek,i)]) tab.classList.add('done');
    if(i===currentDay) tab.classList.add('active');
  }
}
function renderExercises(){
  const cfg = dayConfig(currentDay, currentWeek);
  const k = sk(currentWeek, currentDay);
  const list = document.getElementById('exercise-list'); list.innerHTML='';

  // deload / week banner
  const banner = document.createElement('div');
  if(cfg.deload){
    banner.className = 'deload-banner';
    const isLast = currentWeek===12;
    banner.innerHTML = '<strong>减载周（第'+currentWeek+'周）：</strong>重量降到约峰值的60%，每个动作只做2组。这是主动恢复——让关节、肌腱和神经系统赶上来。'
      + (isLast ? ' 这一周后就可以测1RM看真实进步了。' : ' 下个4周区块会从更高的起点重新冲击。');
  } else {
    banner.className = 'deload-banner';
    banner.style.borderColor = '#222'; banner.style.background='#141414'; banner.style.color='#888';
    const block = Math.floor((currentWeek-1)/4)+1, wib=((currentWeek-1)%4)+1;
    banner.innerHTML = '<strong style="color:#e8ff00;">第'+block+'区块 · 冲击第'+wib+'/3周：</strong>建议重量已自动进阶。点一下打勾✓，再点变✗（没完成）。完成✓自动开始组间计时。';
  }
  list.appendChild(banner);

  let totalSets=0, attempted=0, done=0, tonnage=0;

  cfg.exercises.forEach((ex, exIdx)=>{
    const states = getStates(exIdx, cfg.sets);
    totalSets += cfg.sets;
    const nDone = states.filter(s=>s==='done').length;
    const nFail = states.filter(s=>s==='failed').length;
    attempted += states.filter(s=>s!=='').length;
    done += nDone;
    const allDone = states.every(s=>s!=='');
    const stalled = nFail >= 2;

    const actual = getActual(ex.key, exIdx, currentWeek, currentDay, cfg.pct);
    const loadFull = ex.key==='pullup' ? bodyWeight + actual : actual;
    tonnage += loadFull * cfg.reps * nDone;

    const card = document.createElement('div');
    card.className = 'exercise-card' + (allDone&&nFail===0?' completed-card':'') + (stalled?' stall-card':'');

    let setsHtml='';
    for(let s=0; s<cfg.sets; s++){
      const st = states[s];
      let inner;
      if(st==='done') inner = '<div class="set-check">✓</div>';
      else if(st==='failed') inner = '<div class="set-cross">✗</div>';
      else inner = '<div class="set-reps">'+cfg.reps+'</div>';
      setsHtml += '<div class="set-box '+(st==='done'?'set-done':st==='failed'?'set-failed':'')+'" '
        + 'onclick="cycleSet('+exIdx+','+s+','+cfg.sets+','+cfg.rest+')">'
        + '<div class="set-number">组'+(s+1)+'</div>'+inner+'</div>';
    }

    const ormHtml = loadFull>0
      ? '<span class="orm">预估1RM ~'+epley(loadFull, cfg.reps)+'lbs'+(ex.key==='pullup'?'（含自重）':'')+'</span>' : '';

    card.innerHTML =
      '<div class="exercise-header">'
        +'<div><div class="exercise-name">'+ex.name+' '+(allDone&&nFail===0?'✓':'')+'</div>'
        +'<div class="exercise-target">'+cfg.sets+'组 × '+cfg.reps+'次 · '+ex.note+'</div></div>'
        +'<div class="suggest-badge">建议 '+fmtWeight(ex.key, suggestedNum(ex.key,currentWeek,cfg.pct))+'</div>'
      +'</div>'
      +'<div class="weight-row">'
        +'<div class="weight-stepper">'
          +'<button class="step-btn" onclick="stepWeight('+exIdx+',\''+ex.key+'\',-1)">−</button>'
          +'<div class="weight-value">'+fmtWeight(ex.key, actual)+'</div>'
          +'<button class="step-btn" onclick="stepWeight('+exIdx+',\''+ex.key+'\',1)">+</button>'
        +'</div>'
        +'<div class="weight-meta">实际重量<br>'+ormHtml+'</div>'
      +'</div>'
      +'<div class="sets-grid">'+setsHtml+'</div>'
      +(stalled?'<div class="stall-note">⚠ 这个动作有2组没完成——下周建议保持重量（用 − 调回），别急着加。</div>':'');
    list.appendChild(card);
  });

  document.getElementById('session-progress').style.width = (totalSets? (attempted/totalSets)*100 : 0)+'%';
  document.getElementById('volume-line').innerHTML = tonnage>0 ? ('今日容量 <strong>'+Math.round(tonnage).toLocaleString()+' lbs</strong>') : '';

  const finishBtn = document.getElementById('finish-btn');
  if(completedSessions[k]){ finishBtn.textContent='✓ 已完成'; finishBtn.disabled=true; }
  else { finishBtn.textContent='完成今日训练 ✓'; finishBtn.disabled = attempted < totalSets; }
}

function finishSession(){
  completedSessions[sk(currentWeek,currentDay)] = true;
  stopRest(); save(); renderAll();
}
function selectDay(d){ currentDay=d; stopRest(); renderAll(); }

function stepBody(dir){ bodyWeight = Math.max(50, bodyWeight + dir); save(); renderAll(); }
function renderBody(){ document.getElementById('bw-val').textContent = bodyWeight+'lbs'; }

function renderStats(){
  let sessions=0, weeks=0;
  for(let w=1; w<=12; w++){
    let ws=0;
    for(let d=0; d<3; d++) if(completedSessions[sk(w,d)]){ sessions++; ws++; }
    if(ws===3) weeks++;
  }
  document.getElementById('stat-weeks').textContent = weeks;
  document.getElementById('stat-sessions').textContent = sessions;
  document.getElementById('stat-pct').textContent = Math.round((sessions/36)*100)+'%';
}
function renderAll(){ renderBody(); renderWeeks(); renderDayTabs(); renderExercises(); renderStats(); }

function save(){
  try{
    localStorage.setItem('wk_setStates', JSON.stringify(setStates));
    localStorage.setItem('wk_actual', JSON.stringify(actualWeights));
    localStorage.setItem('wk_sessions', JSON.stringify(completedSessions));
    localStorage.setItem('wk_bodyweight', String(bodyWeight));
  }catch(e){}
}
function load(){
  try{
    const a=localStorage.getItem('wk_setStates'); if(a) setStates=JSON.parse(a);
    const b=localStorage.getItem('wk_actual');   if(b) actualWeights=JSON.parse(b);
    const c=localStorage.getItem('wk_sessions'); if(c) completedSessions=JSON.parse(c);
    const bw=localStorage.getItem('wk_bodyweight'); if(bw) bodyWeight=parseFloat(bw);
    // migrate old keys if present
    const oldS=localStorage.getItem('workout_sessions'); if(oldS && !c) completedSessions=JSON.parse(oldS);
  }catch(e){}
}

load();
renderAll();
</script>
</body>
</html>
